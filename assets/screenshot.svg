<svg width="1100" height="660" viewBox="0 0 1100 660" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&amp;family=Syne:wght@400;600;700;800&amp;display=swap');
      * { font-family: 'Syne', 'Arial', sans-serif; }
      .mono { font-family: 'Space Mono', 'Courier New', monospace; }
    </style>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#0d0d18"/>
    </linearGradient>
    <linearGradient id="accentGlow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(0,229,255,0.08)"/>
      <stop offset="100%" style="stop-color:rgba(0,229,255,0)"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#00e5ff"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="divider" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="50%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="roundedClip">
      <rect width="1100" height="660" rx="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1100" height="660" rx="12" fill="url(#heroBg)"/>
  <rect width="1100" height="660" rx="12" clip-path="url(#roundedClip)" fill="none" stroke="#1e1e2e" stroke-width="1"/>

  <!-- Ambient glow at top -->
  <ellipse cx="550" cy="0" rx="500" ry="120" fill="url(#accentGlow)"/>

  <!-- ── HERO SECTION ── -->
  <!-- Label -->
  <text x="550" y="58" text-anchor="middle" class="mono" font-size="10" fill="#00e5ff" letter-spacing="3">// An Autonomous Multi-Agent AI Research System</text>

  <!-- Title -->
  <text x="550" y="92" text-anchor="middle" font-size="34" font-weight="800" fill="url(#titleGrad)">ResearchFlow.AI</text>

  <!-- Subtitle -->
  <text x="550" y="114" text-anchor="middle" font-size="11.5" fill="#64748b" letter-spacing="0.5">Search → Scrape → Write → Critique  |  Powered by LangChain agents</text>

  <!-- Divider -->
  <rect x="0" y="130" width="1100" height="1" fill="url(#divider)"/>

  <!-- ── LEFT COLUMN ── -->

  <!-- Input card -->
  <rect x="48" y="148" width="330" height="110" rx="10" fill="#111118" stroke="#1e1e2e" stroke-width="1"/>
  <text x="68" y="172" class="mono" font-size="8.5" fill="#64748b" letter-spacing="1.5">RESEARCH TOPIC</text>
  <!-- Input field -->
  <rect x="68" y="180" width="290" height="34" rx="6" fill="#0d0d16" stroke="#00e5ff" stroke-width="1"/>
  <text x="82" y="202" font-size="11" fill="#94a3b8">Artificial General Intelligence safety</text>
  <!-- Launch button -->
  <rect x="68" y="222" width="290" height="28" rx="6" fill="url(#btnGrad)"/>
  <text x="213" y="240" text-anchor="middle" font-size="11" font-weight="700" fill="white">🚀  Launch Pipeline</text>

  <!-- Pipeline Steps label -->
  <text x="48" y="284" font-size="13" font-weight="700" fill="#e2e8f0">Pipeline Steps</text>

  <!-- Step cards -->
  <!-- Step 0: Done -->
  <rect x="48" y="296" width="330" height="54" rx="8" fill="#111118" stroke="#10b981" stroke-width="1"/>
  <rect x="66" y="311" width="28" height="28" rx="6" fill="rgba(16,185,129,0.12)"/>
  <text x="80" y="330" text-anchor="middle" font-size="13">🔍</text>
  <text x="106" y="323" font-size="10.5" font-weight="700" fill="#e2e8f0">Search Agent</text>
  <text x="106" y="337" class="mono" font-size="8" fill="#64748b">Retrieving recent, reliable information</text>
  <rect x="314" y="313" width="50" height="16" rx="8" fill="rgba(16,185,129,0.12)"/>
  <text x="339" y="325" text-anchor="middle" class="mono" font-size="7" fill="#10b981">DONE ✓</text>

  <!-- Step 1: Done -->
  <rect x="48" y="356" width="330" height="54" rx="8" fill="#111118" stroke="#10b981" stroke-width="1"/>
  <rect x="66" y="371" width="28" height="28" rx="6" fill="rgba(16,185,129,0.12)"/>
  <text x="80" y="390" text-anchor="middle" font-size="13">📄</text>
  <text x="106" y="383" font-size="10.5" font-weight="700" fill="#e2e8f0">Reader Agent</text>
  <text x="106" y="397" class="mono" font-size="8" fill="#64748b">Scraping the most relevant URL</text>
  <rect x="314" y="373" width="50" height="16" rx="8" fill="rgba(16,185,129,0.12)"/>
  <text x="339" y="385" text-anchor="middle" class="mono" font-size="7" fill="#10b981">DONE ✓</text>

  <!-- Step 2: Active -->
  <rect x="48" y="416" width="330" height="54" rx="8" fill="#111118" stroke="#00e5ff" stroke-width="1" filter="url(#glow)"/>
  <rect x="66" y="431" width="28" height="28" rx="6" fill="rgba(0,229,255,0.12)"/>
  <text x="80" y="450" text-anchor="middle" font-size="13">✍️</text>
  <text x="106" y="443" font-size="10.5" font-weight="700" fill="#e2e8f0">Writer Chain</text>
  <text x="106" y="457" class="mono" font-size="8" fill="#64748b">Drafting a structured research report</text>
  <rect x="302" y="433" width="62" height="16" rx="8" fill="rgba(0,229,255,0.12)"/>
  <text x="333" y="445" text-anchor="middle" class="mono" font-size="7" fill="#00e5ff">RUNNING…</text>

  <!-- Step 3: Pending -->
  <rect x="48" y="476" width="330" height="54" rx="8" fill="#111118" stroke="#1e1e2e" stroke-width="1" opacity="0.5"/>
  <rect x="66" y="491" width="28" height="28" rx="6" fill="rgba(100,116,139,0.08)"/>
  <text x="80" y="510" text-anchor="middle" font-size="13" opacity="0.5">🧠</text>
  <text x="106" y="503" font-size="10.5" font-weight="700" fill="#64748b">Critic Chain</text>
  <text x="106" y="517" class="mono" font-size="8" fill="#374151">Reviewing and scoring the report quality</text>
  <rect x="310" y="493" width="52" height="16" rx="8" fill="rgba(100,116,139,0.08)"/>
  <text x="336" y="505" text-anchor="middle" class="mono" font-size="7" fill="#64748b">WAITING</text>

  <!-- Status line -->
  <text x="48" y="548" class="mono" font-size="9" fill="#64748b">⟶ Drafting full research report…</text>

  <!-- ── RIGHT COLUMN ── -->

  <!-- Stat strip -->
  <rect x="420" y="148" width="120" height="30" rx="6" fill="#111118" stroke="#1e1e2e" stroke-width="1"/>
  <text x="432" y="168" class="mono" font-size="8.5" fill="#64748b">📝 words <tspan fill="#00e5ff" font-weight="700">1,842</tspan></text>

  <rect x="548" y="148" width="128" height="30" rx="6" fill="#111118" stroke="#1e1e2e" stroke-width="1"/>
  <text x="560" y="168" class="mono" font-size="8.5" fill="#64748b">🔍 search <tspan fill="#00e5ff" font-weight="700">4,210</tspan></text>

  <rect x="684" y="148" width="138" height="30" rx="6" fill="#111118" stroke="#1e1e2e" stroke-width="1"/>
  <text x="696" y="168" class="mono" font-size="8.5" fill="#64748b">📄 scraped <tspan fill="#00e5ff" font-weight="700">12,004</tspan></text>

  <!-- Tabs -->
  <rect x="420" y="188" width="632" height="38" rx="8 8 0 0" fill="#111118" stroke="#1e1e2e" stroke-width="1"/>
  <!-- Active tab -->
  <rect x="420" y="188" width="140" height="38" rx="8 0 0 0" fill="transparent"/>
  <line x1="420" y1="224" x2="560" y2="224" stroke="#00e5ff" stroke-width="2"/>
  <text x="490" y="212" text-anchor="middle" font-size="10.5" font-weight="600" fill="#00e5ff">📋 Final Report</text>
  <!-- Other tabs -->
  <text x="636" y="212" text-anchor="middle" font-size="10.5" font-weight="600" fill="#64748b">🔍 Search Results</text>
  <text x="782" y="212" text-anchor="middle" font-size="10.5" font-weight="600" fill="#64748b">📄 Scraped Content</text>
  <text x="974" y="212" text-anchor="middle" font-size="10.5" font-weight="600" fill="#64748b">🧠 Critic Feedback</text>

  <!-- Report content area -->
  <rect x="420" y="226" width="632" height="360" rx="0 0 10 10" fill="#111118" stroke="#1e1e2e" stroke-width="1"/>
  <rect x="438" y="244" width="596" height="322" rx="6" fill="#0d0d16"/>

  <!-- Report text lines -->
  <text x="456" y="268" font-size="13" font-weight="700" fill="#e2e8f0">Artificial General Intelligence: Safety Considerations</text>
  <rect x="456" y="276" width="560" height="1" fill="#1e1e2e"/>

  <text x="456" y="296" font-size="9.5" fill="#94a3b8">The development of Artificial General Intelligence (AGI) represents one of the most consequential</text>
  <text x="456" y="310" font-size="9.5" fill="#94a3b8">technological undertakings in human history. Unlike narrow AI systems designed for specific tasks,</text>
  <text x="456" y="324" font-size="9.5" fill="#94a3b8">AGI refers to systems capable of performing any intellectual task that a human can. This breadth of</text>
  <text x="456" y="338" font-size="9.5" fill="#94a3b8">capability introduces unique alignment challenges that the research community is actively addressing.</text>

  <text x="456" y="360" font-size="11" font-weight="700" fill="#e2e8f0">Key Safety Challenges</text>
  <text x="456" y="378" font-size="9.5" fill="#94a3b8">• Value alignment: Ensuring AGI systems pursue goals consistent with human values</text>
  <text x="456" y="392" font-size="9.5" fill="#94a3b8">• Interpretability: Understanding internal representations in large-scale models</text>
  <text x="456" y="406" font-size="9.5" fill="#94a3b8">• Robustness: Maintaining safe behavior under distribution shift and adversarial inputs</text>
  <text x="456" y="420" font-size="9.5" fill="#94a3b8">• Scalable oversight: Supervising systems that may exceed human capability in narrow domains</text>

  <text x="456" y="442" font-size="11" font-weight="700" fill="#e2e8f0">Current Research Directions</text>
  <text x="456" y="460" font-size="9.5" fill="#94a3b8">Leading labs including Anthropic, OpenAI, and DeepMind are investing heavily in interpretability</text>
  <text x="456" y="474" font-size="9.5" fill="#94a3b8">research, constitutional AI methods, and scalable oversight frameworks. The field has seen significant</text>
  <text x="456" y="488" font-size="9.5" fill="#94a3b8">progress in mechanistic interpretability, with circuit-level analysis revealing how transformers</text>
  <text x="456" y="502" font-size="9.5" fill="#94a3b8">represent and process information at a granular level...</text>

  <!-- Fade overlay at bottom of report -->
  <defs>
    <linearGradient id="fadeOut" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="100%" style="stop-color:#0d0d16"/>
    </linearGradient>
  </defs>
  <rect x="438" y="500" width="596" height="66" rx="0 0 6 6" fill="url(#fadeOut)"/>

  <!-- Download button -->
  <rect x="438" y="574" width="596" height="5" fill="transparent"/>

  <!-- Border -->
  <rect width="1100" height="660" rx="12" fill="none" stroke="#1e1e2e" stroke-width="1"/>
</svg>
